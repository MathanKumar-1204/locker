input {
  beats {
    port => 5044
  }
  
  file {
    path => "C:/Users/Mathan/Desktop/locker_system/logs/*.log"
    start_position => "beginning"
    sincedb_path => "NUL"
    codec => multiline {
      pattern => "^%{TIMESTAMP_ISO8601}"
      negate => true
      what => "previous"
    }
  }
}

filter {
  grok {
    match => { 
      "message" => "%{LOGLEVEL:log_level} %{TIMESTAMP_ISO8601:timestamp} %{WORD:module} %{NUMBER:process} %{NUMBER:thread} %{GREEDYDATA:log_message}" 
    }
  }
  
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
  
  mutate {
    remove_field => [ "timestamp" ]
  }
  
  if [path] =~ "error" {
    mutate {
      add_field => { "log_type" => "error" }
    }
  } else {
    mutate {
      add_field => { "log_type" => "application" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "locker-system-logs-%{+YYYY.MM.dd}"
  }
  
  stdout { 
    codec => rubydebug 
  }
}
